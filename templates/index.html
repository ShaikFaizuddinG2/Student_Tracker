<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Tracker</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width:650px;
            background: rgba(255,255,255,0.95);
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 30px rgba(0,0,0,0.2);
        }

        h1{
            color:#2c3e50;
        }

        a{
            display:block;
            margin:15px;
            padding:12px;
            text-decoration:none;
            background:#3498db;
            color:white;
            border-radius:8px;
            font-size:18px;
        }

        a:hover{
            background:#2980b9;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎓 Student Performance Tracker</h1>

    <a href="/add_student">Add Student</a>
    <a href="/add_grades">Add Grades</a>
    <a href="/view_student">View Student</a>
    <style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:500px;
}

input{
    width:95%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#3498db;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}
</style>
</div>

</body>
</html>
